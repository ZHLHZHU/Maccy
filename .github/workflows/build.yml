name: Build

on:
  push:
    branches: [ "fix/**", "ci/**" ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -project Maccy.xcodeproj \
            -scheme Maccy \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package
        run: |
          cd build/Build/Products/Debug
          zip -r Maccy.zip Maccy.app

      - uses: actions/upload-artifact@v4
        with:
          name: Maccy
          path: build/Build/Products/Debug/Maccy.zip
